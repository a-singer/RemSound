name: Build iOS Receiver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate

      - name: Build for Generic iOS Device
        run: |
          cd ios
          xcodebuild build \
            -project RemReceiver.xcodeproj \
            -scheme RemReceiver \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/RemReceiver.app build/Payload/
          cd build
          zip -r RemReceiver.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemReceiver-IPA
          path: build/RemReceiver.ipa
