name: Build iOS Receiver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Configure Git for SPM
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate

      - name: Resolve Package Dependencies
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project RemReceiver.xcodeproj \
            -scheme RemReceiver

      - name: Build for Generic iOS Device
        run: |
          cd ios
          xcodebuild build \
            -project RemReceiver.xcodeproj \
            -scheme RemReceiver \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "RemReceiver.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: RemReceiver.app not found"
            exit 1
          fi
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r RemReceiver.ipa Payload
          echo "IPA Size:"
          du -sh RemReceiver.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemReceiver-Sideloadable-IPA
          path: build/RemReceiver.ipa
          retention-days: 7
