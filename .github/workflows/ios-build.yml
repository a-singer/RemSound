name: Build iOS Receiver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate

      - name: Build for Simulator
        run: |
          cd ios
          xcodebuild build \
            -project RemReceiver.xcodeproj \
            -scheme RemReceiver \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemReceiver-Simulator-Build
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphonesimulator/RemReceiver.app
