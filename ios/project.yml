name: RemReceiver
options:
  bundleIdPrefix: com.rem.receiver
packages:
  SwiftOpus:
    url: https://github.com/shogo4405/SwiftOpus.git
    from: 1.1.0
targets:
  RemReceiver:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - RemReceiver
    dependencies:
      - package: SwiftOpus
    settings:
      base:
        INFOPLIST_FILE: RemReceiver/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rem.receiver.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_ENTITLEMENTS: ""
